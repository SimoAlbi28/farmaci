<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Ombra di base -->
  <ellipse cx="60" cy="110" rx="36" ry="5" fill="#d4a84b" opacity="0.15"/>

  <!-- Flacone medicinale -->
  <rect x="34" y="28" width="52" height="8" rx="3" fill="#e8a317"/>
  <rect x="38" y="36" width="44" height="60" rx="8" fill="url(#bottleGrad)"/>
  <rect x="38" y="36" width="44" height="16" rx="0" fill="white" opacity="0.2"/>

  <!-- Etichetta sul flacone -->
  <rect x="44" y="52" width="32" height="22" rx="4" fill="white" opacity="0.9"/>
  <!-- Croce sulla etichetta -->
  <rect x="56" y="55" width="8" height="16" rx="2" fill="#c0392b"/>
  <rect x="52" y="59" width="16" height="8" rx="2" fill="#c0392b"/>

  <!-- Capsula in alto a destra -->
  <g transform="translate(82, 16) rotate(30)">
    <rect x="0" y="0" width="12" height="28" rx="6" fill="#f0b429"/>
    <rect x="0" y="14" width="12" height="14" rx="6" fill="#c96b20"/>
  </g>

  <!-- Pillola rotonda in basso a sinistra -->
  <circle cx="24" cy="82" r="10" fill="#e8a317" opacity="0.9"/>
  <line x1="18" y1="82" x2="30" y2="82" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Pillola rotonda piccola -->
  <circle cx="18" cy="64" r="6" fill="#f0b429" opacity="0.7"/>

  <!-- Compressa ovale in basso a destra -->
  <ellipse cx="96" cy="78" rx="8" ry="12" transform="rotate(-20, 96, 78)" fill="#d4880f" opacity="0.85"/>
  <line x1="90" y1="75" x2="102" y2="81" stroke="white" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Brillantino decorativo -->
  <circle cx="48" cy="24" r="2" fill="white" opacity="0.6"/>
  <circle cx="92" cy="52" r="1.5" fill="white" opacity="0.4"/>

  <defs>
    <linearGradient id="bottleGrad" x1="38" y1="36" x2="82" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="50%" stop-color="#e8a317"/>
      <stop offset="100%" stop-color="#d4880f"/>
    </linearGradient>
  </defs>
</svg>
